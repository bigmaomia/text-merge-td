<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750">
<title>武将养成 · 赵云与阿斗</title>
<link rel="stylesheet" href="style-guide.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; justify-content:center; }
  .screen { width:750px; height:1334px; position:relative; overflow:hidden;
    background: linear-gradient(180deg,#2C3E50 0%, #1A1A24 100%);
    font-family:var(--f-body); color:var(--c-paper); }

  .topbar { height:88px; display:flex; align-items:center; padding:0 var(--safe-x);
    background:rgba(26,26,36,.7); }
  .topbar h2 { font-family:var(--f-title); font-size:var(--fs-h1); color:var(--c-gold); }

  .layout { display:flex; height:calc(1334px - 88px - 100px); }
  /* 左栏列表 */
  .hero-list { width:200px; background:rgba(26,26,36,.5); border-right:var(--bd);
    overflow-y:auto; padding:12px 0; }
  .hero-item { display:flex; align-items:center; gap:10px; padding:12px 16px;
    border-left:6px solid transparent; }
  .hero-item.sel { border-left-color:var(--c-red); background:rgba(192,57,43,.15); }
  .hero-ava { width:64px; height:64px; border-radius:50%; background:var(--c-jade);
    border:var(--bd); flex:none; display:flex; align-items:center; justify-content:center; font-size:30px; }
  .hero-item .hn { font-size:var(--fs-sm); }
  .hero-item .hs { font-family:var(--f-num); font-size:var(--fs-xs); color:var(--c-gold); }

  /* 右栏详情 */
  .detail { flex:1; padding:var(--sp-3); overflow-y:auto; }
  .hero-head { display:flex; gap:var(--sp-3); align-items:center; }
  .hero-portrait { width:200px; height:200px; border-radius:var(--r-card); background:var(--c-purple);
    border:var(--bd-gold); display:flex; align-items:center; justify-content:center; font-size:90px;
    box-shadow:var(--shadow-pixel); }
  .hero-meta .hn { font-family:var(--f-title); font-size:var(--fs-giant); color:#fff; }
  .rar { display:inline-block; margin-top:8px; }
  .hero-meta .power { font-family:var(--f-num); font-size:var(--fs-h2); color:var(--c-gold); margin-top:12px; }
  .hero-meta .lv { font-size:var(--fs-body); color:var(--c-paper); }

  /* 养成四宫格 */
  .grid4 { display:grid; grid-template-columns:repeat(2,1fr); gap:var(--sp-2); margin-top:var(--sp-3); }
  .gcard { background:var(--c-ink); border:var(--bd); border-radius:var(--r-card);
    padding:var(--sp-2); display:flex; align-items:center; gap:12px; }
  .gcard .gi { font-size:40px; }
  .gcard .gt { font-size:var(--fs-sm); }
  .gcard .gv { font-family:var(--f-num); font-size:var(--fs-sm); color:var(--c-gold); }

  .equip { margin-top:var(--sp-3); }
  .equip h3 { font-family:var(--f-title); font-size:var(--fs-h2); color:var(--c-gold); margin-bottom:12px; }
  .slots { display:flex; gap:12px; }
  .slot { width:120px; height:120px; border-radius:var(--r-card); background:rgba(245,239,224,.08);
    border:2px dashed var(--c-gray); display:flex; align-items:center; justify-content:center;
    font-size:40px; color:var(--c-gray); }

  .acts { display:flex; gap:12px; margin-top:var(--sp-4); }
  .acts .btn { flex:1; }
  .btn-up { background:var(--c-jade); }
  .btn-star { background:var(--c-purple); }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar"><h2>武将养成</h2></div>
  <div class="layout">
    <div class="hero-list">
      <div class="hero-item sel"><div class="hero-ava">🐴</div><div><div class="hn">赵云</div><div class="hs">★★★★</div></div></div>
      <div class="hero-item"><div class="hero-ava">🔥</div><div><div class="hn">张飞</div><div class="hs">★★★</div></div></div>
      <div class="hero-item"><div class="hero-ava">⚔️</div><div><div class="hn">关羽</div><div class="hs">★★★★★</div></div></div>
      <div class="hero-item"><div class="hero-ava">🏹</div><div><div class="hn">黄忠</div><div class="hs">★★★</div></div></div>
      <div class="hero-item"><div class="hero-ava">🌟</div><div><div class="hn">诸葛亮</div><div class="hs">★★★★★</div></div></div>
      <div class="hero-item"><div class="hero-ava">💀</div><div><div class="hn">吕布</div><div class="hs">UR</div></div></div>
    </div>

    <div class="detail">
      <div class="hero-head">
        <div class="hero-portrait">🐴</div>
        <div class="hero-meta">
          <div class="hn">赵云</div>
          <span class="rar rar-SR">SR</span>
          <div class="lv">等级 Lv.12</div>
          <div class="power">战力 12345</div>
        </div>
      </div>

      <div class="grid4">
        <div class="gcard"><div class="gi">⭐</div><div><div class="gt">升星</div><div class="gv">4★→5★ (碎片80)</div></div></div>
        <div class="gcard"><div class="gi">🗡️</div><div><div class="gt">装备</div><div class="gv">3/3 已穿戴</div></div></div>
        <div class="gcard"><div class="gi">💫</div><div><div class="gt">技能</div><div class="gv">主动+2被动</div></div></div>
        <div class="gcard"><div class="gi">🔗</div><div><div class="gt">羁绊</div><div class="gv">五虎上将 激活</div></div></div>
      </div>

      <div class="equip">
        <h3>装备槽</h3>
        <div class="slots">
          <div class="slot">🗡️</div>
          <div class="slot">🛡️</div>
          <div class="slot">🐎</div>
        </div>
      </div>

      <div class="acts">
        <div class="btn btn-up">金币升级</div>
        <div class="btn btn-star">碎片升星</div>
      </div>
    </div>
  </div>
  <div class="banner-ad">武将界面 Banner（示意）</div>
</div>
</body>
</html>
